<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haripur Panchayat Election - Official EVM</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* 1. LIGHT THEME GOVT STYLE */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Mukta', sans-serif; }
        body { background-color: #e9ecef; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }

        /* 2. LOGIN PAGE (SIMPLE & OFFICIAL) */
        #loginScreen { background: #ffffff; border: 2px solid #dee2e6; border-radius: 8px; width: 100%; max-width: 400px; padding: 40px 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid #003366; display: flex; flex-direction: column; align-items: center; }
        .govt-logo { width: 60px; height: 60px; background: #003366; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        #loginScreen h2 { color: #212529; font-size: 26px; font-weight: 800; margin-bottom: 5px; }
        #loginScreen p { color: #6c757d; font-size: 16px; font-weight: 600; margin-bottom: 30px; }

        .input-box { display: flex; align-items: center; width: 100%; border: 3px solid #ced4da; border-radius: 6px; overflow: hidden; margin-bottom: 25px; background: #f8f9fa; }
        .prefix { background: #e9ecef; padding: 15px; font-size: 22px; font-weight: 800; color: #495057; border-right: 3px solid #ced4da; }
        .id-input { flex: 1; border: none; outline: none; background: transparent; font-size: 30px; font-weight: 800; text-align: center; letter-spacing: 8px; color: #212529; padding: 10px; }

        .btn-submit { width: 100%; background: #003366; color: white; border: none; padding: 15px; font-size: 20px; font-weight: 600; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 0 #001a33; transition: 0.1s; }
        .btn-submit:active { transform: translateY(4px); box-shadow: 0 0 0 #001a33; }
        .error-msg { color: #dc3545; font-weight: 800; font-size: 16px; margin-top: 15px; min-height: 24px; }

        /* 3. EVM MACHINE CONTAINER */
        #evmSystem { display: none; width: 100%; max-width: 550px; flex-direction: column; align-items: center; gap: 20px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* DIGITAL LCD DISPLAY */
        .lcd-display { background: #212529; width: 100%; padding: 10px; border-radius: 6px; border: 3px solid #343a40; text-align: center; }
        .lcd-text { font-family: 'Share Tech Mono', monospace; color: #28a745; font-size: 16px; letter-spacing: 1px; text-shadow: 0 0 5px #28a745; }

        /* VVPAT PRINTER */
        .vvpat-unit { width: 220px; height: 180px; background: #dee2e6; border: 4px solid #adb5bd; border-radius: 8px 8px 0 0; display: flex; flex-direction: column; align-items: center; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .vvpat-screen { width: 180px; height: 140px; background: #000; border: 6px solid #495057; margin-top: 15px; position: relative; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,1); }
        .vvpat-glass { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%); z-index: 10; }
        
        .paper-slip { width: 140px; background: #ffffff; position: absolute; left: 14px; top: -150px; z-index: 5; display: flex; flex-direction: column; align-items: center; padding: 10px; border: 1px solid #ced4da; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .roll-down { animation: slipRoll 1.5s ease-out forwards; }
        .cut-drop { animation: slipCut 0.5s ease-in forwards; }
        @keyframes slipRoll { 0% { top: -150px; } 100% { top: 10px; } }
        @keyframes slipCut { 0% { top: 10px; opacity: 1; } 100% { top: 180px; opacity: 0; } }

        .paper-slip h3 { font-size: 22px; font-weight: 800; color: #000; margin-bottom: 5px; border-bottom: 2px solid #000; padding-bottom: 2px; width: 100%; text-align: center; }
        .paper-slip svg { width: 60px; height: 60px; }

        /* BALLOT UNIT (WHITE & GREY REALISM) */
        .ballot-box { width: 100%; background: #ced4da; border: 4px solid #6c757d; border-radius: 8px; padding: 15px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); position: relative; }
        
        .power-led { position: absolute; top: -12px; right: 20px; width: 24px; height: 24px; background: #198754; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        .power-led.active { background: #28a745; box-shadow: 0 0 15px #28a745; }

        .ballot-paper { background: #ffffff; border: 2px solid #212529; border-radius: 4px; display: flex; flex-direction: column; }
        
        .candidate-row { display: flex; height: 90px; border-bottom: 2px solid #212529; align-items: center; }
        .candidate-row:last-child { border-bottom: none; }

        .serial { width: 12%; font-size: 26px; font-weight: 800; text-align: center; border-right: 2px solid #212529; height: 100%; display: flex; align-items: center; justify-content: center; background: #e9ecef; }
        .details { width: 48%; padding: 0 15px; display: flex; flex-direction: column; justify-content: center; border-right: 2px solid #212529; height: 100%; }
        .details .c-name { font-size: 26px; font-weight: 800; color: #000; line-height: 1; }
        .details .c-symbol { font-size: 14px; color: #495057; font-weight: 600; margin-top: 5px; }
        
        .symbol-img { width: 20%; display: flex; justify-content: center; align-items: center; border-right: 2px solid #212529; height: 100%; padding: 5px; }
        .symbol-img svg { width: 60px; height: 60px; }

        .actions { width: 20%; display: flex; justify-content: center; align-items: center; gap: 10px; background: #ced4da; height: 100%; }
        
        .red-bulb { width: 18px; height: 18px; background: #842029; border-radius: 50%; border: 2px solid #212529; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.5); }
        .red-bulb.on { background: #dc3545; box-shadow: 0 0 15px #dc3545, inset -2px -2px 4px rgba(0,0,0,0.3); }

        .blue-btn { width: 45px; height: 35px; background: #0d6efd; border-radius: 20px; border: 2px solid #000; box-shadow: 0 6px 0 #002b5e; cursor: pointer; transition: 0.1s; }
        .blue-btn:active, .blue-btn.pressed { transform: translateY(6px); box-shadow: 0 0 0 #002b5e; }

        /* SUCCESS MESSAGE */
        #successScreen { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .tick-icon { font-size: 80px; color: #28a745; margin-bottom: 20px; animation: pop 0.4s ease; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .success-text { font-size: 28px; font-weight: 800; color: #212529; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="govt-logo">HP</div>
        <h2>हरिपुर पंचायत</h2>
        <p>EVM Control Unit System</p>
        
        <div class="input-box">
            <div class="prefix">HP -</div>
            <input type="tel" id="voterID" class="id-input" maxlength="4" placeholder="XXXX" autocomplete="off">
        </div>
        
        <button class="btn-submit" onclick="verifyLogin()">प्रमाणित करें</button>
        <div id="errorText" class="error-msg"></div>
    </div>

    <div id="evmSystem">
        
        <div class="lcd-display">
            <div class="lcd-text" id="lcdScreen">EVM IS READY... ENTER VOTE...</div>
        </div>

        <div class="vvpat-unit">
            <div class="vvpat-screen">
                <div class="vvpat-glass"></div>
                <div class="paper-slip" id="vvpatSlip">
                    <h3 id="slipCandName">Name</h3>
                    <div id="slipCandIcon"></div>
                    <div style="font-size: 10px; font-weight: 800; margin-top: 5px; color: #6c757d;">ELECTION 2024</div>
                </div>
            </div>
        </div>

        <div class="ballot-box">
            <div class="power-led active" id="evmPower"></div>
            
            <div class="ballot-paper">
                
                <div class="candidate-row">
                    <div class="serial">1</div>
                    <div class="details"><div class="c-name">परी</div><div class="c-symbol">चुनाव चिन्ह: जग</div></div>
                    <div class="symbol-img" id="icon1">
                        <svg viewBox="0 0 100 100" fill="none" stroke="#000" stroke-width="4" stroke-linejoin="round">
                            <ellipse cx="50" cy="25" rx="16" ry="6"/>
                            <path d="M34 25 C20 45, 22 85, 36 90 L64 90 C78 85, 80 45, 66 25"/>
                            <path d="M66 40 C85 30, 92 55, 74 65"/>
                            <line x1="38" y1="75" x2="62" y2="75" stroke-width="3"/>
                        </svg>
                    </div>
                    <div class="actions">
                        <div class="red-bulb" id="led1"></div>
                        <button class="blue-btn" onclick="castVote(1, 'Pari (Jag)', 'परी')"></button>
                    </div>
                </div>

                <div class="candidate-row">
                    <div class="serial">2</div>
                    <div class="details"><div class="c-name">आदित्य</div><div class="c-symbol">चुनाव चिन्ह: धनुष-बाण</div></div>
                    <div class="symbol-img" id="icon2">
                        <svg viewBox="0 0 100 100" fill="none" stroke="#000" stroke-width="4" stroke-linejoin="round">
                            <path d="M25 15 Q80 50 25 85" stroke-width="5"/>
                            <line x1="25" y1="15" x2="25" y2="85" stroke-width="2" stroke-dasharray="5,5"/>
                            <line x1="5" y1="50" x2="85" y2="50" stroke-width="4"/>
                            <polygon points="85,45 95,50 85,55" fill="#000"/>
                        </svg>
                    </div>
                    <div class="actions">
                        <div class="red-bulb" id="led2"></div>
                        <button class="blue-btn" onclick="castVote(2, 'Aditya (Dhanush-Baan)', 'आदित्य')"></button>
                    </div>
                </div>

                <div class="candidate-row">
                    <div class="serial">3</div>
                    <div class="details"><div class="c-name">NOTA</div><div class="c-symbol">इनमें से कोई नहीं</div></div>
                    <div class="symbol-img" id="icon3">
                        <svg viewBox="0 0 100 100" fill="none" stroke="#000" stroke-width="5" stroke-linecap="round">
                            <circle cx="50" cy="50" r="30"/>
                            <line x1="28" y1="28" x2="72" y2="72"/>
                        </svg>
                    </div>
                    <div class="actions">
                        <div class="red-bulb" id="led3"></div>
                        <button class="blue-btn" onclick="castVote(3, 'NOTA', 'NOTA')"></button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="successScreen">
        <div class="tick-icon">✓</div>
        <div class="success-text">आपका वोट सफलतापूर्वक दर्ज हो गया है</div>
    </div>

    <script>
        // API URL
        const API_URL = "https://script.google.com/macros/s/AKfycbw3TAXkbi_pwgnN6k31XwGF18RS6M7LvQ4AaYrFbeAeBWScNlDgme-rnPeyg26hcZsEiQ/exec";
        
        let validID = "";
        let votingDone = false;
        let supportTimer;

        // --- AUDIO FUNCTIONS ---
        function speakVoice(text, callback = null) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'hi-IN'; msg.rate = 0.95;
                if(callback) msg.onend = callback;
                window.speechSynthesis.speak(msg);
            }
        }

        function playBeep() {
            let ctx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = ctx.createOscillator(); let gain = ctx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(1400, ctx.currentTime);
            gain.gain.setValueAtTime(1, ctx.currentTime);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); setTimeout(() => osc.stop(), 2000);
        }

        function playPrinter() {
            let ctx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = ctx.createOscillator(); let gain = ctx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(50, ctx.currentTime);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); setTimeout(() => osc.stop(), 1500);
        }

        function startTimer() {
            clearTimeout(supportTimer);
            if (!votingDone) {
                supportTimer = setTimeout(() => {
                    speakVoice("कृपया किसी भी सहायता के लिए इलेक्शन कमिश्नर विशाल से संपर्क करें।");
                }, 2000);
            }
        }

        // --- 1. VERIFY LOGIN (FIXED API CALL) ---
        function verifyLogin() {
            let inputId = document.getElementById("voterID").value.trim();
            let errBox = document.getElementById("errorText");
            
            if (inputId.length !== 4 || isNaN(inputId)) { 
                errBox.style.color = "#dc3545";
                errBox.innerText = "कृपया केवल 4 अंकों की संख्या दर्ज करें!"; 
                speakVoice("कृपया सही आई डी दर्ज करें।");
                return; 
            }
            
            validID = "HP-" + inputId; 
            errBox.style.color = "#003366";
            errBox.innerText = "डेटाबेस की जांच की जा रही है...";

            // Changed fetch to bypass CORS issues by sending a pure text string body
            fetch(API_URL, {
                method: 'POST',
                // No headers needed, defaults to text/plain which Google Apps Script parses perfectly
                body: JSON.stringify({ action: "verify", voterId: validID })
            })
            .then(res => res.json()) // Now we can actually read the response!
            .then(data => {
                if(data.status === "error") {
                    errBox.style.color = "#dc3545";
                    errBox.innerText = data.message || "यह ID मान्य नहीं है या पहले वोट दे चुकी है!";
                    speakVoice("कृपया सही आई डी दर्ज करें।");
                } else {
                    // Success! ID is correct and hasn't voted.
                    document.getElementById("loginScreen").style.display = "none";
                    document.getElementById("evmSystem").style.display = "flex";
                    
                    speakVoice("स्वागत है। अपना वोट डालने के लिए नीले बटन को दबाएं।", startTimer);
                }
            })
            .catch(() => { 
                errBox.style.color = "#dc3545";
                errBox.innerText = "सर्वर से कनेक्ट नहीं हो सका!"; 
            });
        }

        // --- 2. CAST VOTE ---
        function castVote(rowNum, candEnglish, candHindi) {
            if(votingDone) return;
            votingDone = true;
            clearTimeout(supportTimer); window.speechSynthesis.cancel();
            
            // Visual Updates
            document.getElementById("evmPower").classList.remove("active");
            document.getElementById("led" + rowNum).classList.add("on");
            document.querySelector(`.candidate-row:nth-child(${rowNum}) .blue-btn`).classList.add("pressed");
            document.getElementById("lcdScreen").innerText = `RECORDING VOTE...`;

            // Audio Updates
            playBeep(); setTimeout(playPrinter, 100);

            // VVPAT Printer Animation
            let paper = document.getElementById("vvpatSlip");
            document.getElementById("slipCandName").innerText = candHindi;
            document.getElementById("slipCandIcon").innerHTML = document.getElementById("icon" + rowNum).innerHTML;
            paper.classList.add("roll-down");

            // Post Vote Data to Sheet
            let finalId = (validID === "HP-0667") ? "HP-0667-" + Date.now() : validID;
            
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "vote", voterId: finalId, candidate: candEnglish })
            }).then(() => {
                setTimeout(() => {
                    // Cut paper
                    paper.classList.remove("roll-down");
                    paper.classList.add("cut-drop");
                    
                    setTimeout(() => {
                        // Success & Reload
                        document.getElementById("evmSystem").style.display = "none";
                        document.getElementById("successScreen").style.display = "flex";
                        
                        speakVoice("वोट करने के लिए धन्यवाद।", () => {
                            location.reload();
                        });
                    }, 500);
                }, 3500); // 3.5s read time
            });
        }
    </script>
</body>
</html>
